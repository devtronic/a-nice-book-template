---
# ── Book identity ────────────────────────────────────────────────
title: "Write the Docs"
subtitle: "A Complete Guide to This Book Writing Template"
author:
  - "Julian"
date: "2026"
lang: en-US

# ── PDF / LaTeX variables ────────────────────────────────────────
documentclass: book
classoption:
  - twoside
  - 12pt
papersize: letter    # or a4

# Margins — with twoside, "left" = inner (spine) and "right" = outer edge.
# Increase inner for binding if needed, e.g. inner=1in, outer=0.75in.
geometry: "top=1in, bottom=1in, left=0.875in, right=0.75in"

# Fonts (XeLaTeX via fontspec)
# Inter must be installed: brew install --cask font-inter
# Fira Code must be installed: brew install --cask font-fira-code
mainfont: "Inter"
sansfont: "Inter"
monofont: "Fira Code"
monofontoptions:
  - "Contextuals=Alternate"  # enables Fira Code programming ligatures
  - "Scale=0.85"

# Colored hyperlinks in the PDF
colorlinks: true
linkcolor: NavyBlue
citecolor: NavyBlue
urlcolor: NavyBlue

# Embedded PDF metadata
# Note: pdfkeywords values with commas must be set in preamble.tex via
# \hypersetup{} to avoid keyval parsing issues. Set author/title here:
hyperrefoptions:
  - "pdfauthor={Julian}"
  - "pdftitle={Write the Docs}"
  - "pdfsubject={Technical Writing}"

# ── Localization ─────────────────────────────────────────────────
# Setting `lang` makes babel translate all standard labels automatically:
# chapter headings, table of contents title, "Figure", "Table", etc.
#   en-US  →  Chapter, Contents, Figure …
#   de-DE  →  Kapitel, Inhaltsverzeichnis, Abbildung …
#   fr-FR  →  Chapitre, Table des matières, Figure …
#   es-ES  →  Capítulo, Índice general, Figura …
#
# Callout box titles are configured here. Icons can be changed or removed.
# FontAwesome5 icon list: https://fontawesome.com/icons
# header-includes runs before preamble.tex, so \newcommand here takes
# precedence over \providecommand defaults in preamble.tex.
#
# English (default — no header-includes needed):
# header-includes:
#   - \newcommand{\callouttip}{\faLightbulb\enspace Tip}
#   - \newcommand{\calloutwarning}{\faExclamationTriangle\enspace Warning}
#   - \newcommand{\calloutdanger}{\faFire\enspace Danger}
#
# German:
# header-includes:
#   - \newcommand{\callouttip}{\faLightbulb\enspace Tipp}
#   - \newcommand{\calloutwarning}{\faExclamationTriangle\enspace Warnung}
#   - \newcommand{\calloutdanger}{\faFire\enspace Gefahr}

# ── Table of contents ────────────────────────────────────────────
toc: true
toc-depth: 3
numbersections: true
---
